<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Kalix Aurora</title>
  <desc id="desc">Original abstract aurora illustration for the Kalix PHP framework.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1f3d"/>
      <stop offset="55%" stop-color="#1b3a5a"/>
      <stop offset="100%" stop-color="#274d63"/>
    </linearGradient>

    <linearGradient id="auroraA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7ef2c7" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2ed3ff" stop-opacity="0.1"/>
    </linearGradient>

    <linearGradient id="auroraB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d2ffe6" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#6de2ff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#132b39"/>
      <stop offset="100%" stop-color="#0d1e2a"/>
    </linearGradient>

    <filter id="blurLarge" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <g filter="url(#blurLarge)">
    <path d="M-90,380 C220,160 470,540 820,300 C1110,100 1440,410 1710,230 L1710,540 L-90,540 Z" fill="url(#auroraA)"/>
    <path d="M-120,470 C240,250 540,640 900,410 C1180,230 1430,530 1720,360 L1720,650 L-120,650 Z" fill="url(#auroraB)"/>
  </g>

  <circle cx="1260" cy="140" r="62" fill="#f5ffd8" opacity="0.85"/>
  <circle cx="1260" cy="140" r="120" fill="#f5ffd8" opacity="0.12"/>

  <g opacity="0.75" fill="#d9f4ff">
    <circle cx="180" cy="120" r="2"/>
    <circle cx="260" cy="170" r="2"/>
    <circle cx="370" cy="95" r="1.8"/>
    <circle cx="430" cy="150" r="2.4"/>
    <circle cx="540" cy="115" r="2"/>
    <circle cx="680" cy="165" r="2.2"/>
    <circle cx="760" cy="96" r="1.8"/>
    <circle cx="910" cy="140" r="2.2"/>
    <circle cx="1020" cy="88" r="2"/>
    <circle cx="1135" cy="175" r="1.8"/>
    <circle cx="1380" cy="80" r="1.6"/>
    <circle cx="1460" cy="160" r="2"/>
  </g>

  <rect x="0" y="640" width="1600" height="260" fill="url(#ground)"/>

  <g fill="#0c1923">
    <polygon points="120,690 190,570 260,690"/>
    <polygon points="210,690 320,510 430,690"/>
    <polygon points="360,690 510,470 660,690"/>
    <polygon points="580,690 760,445 940,690"/>
    <polygon points="850,690 1010,505 1170,690"/>
    <polygon points="1080,690 1200,560 1320,690"/>
    <polygon points="1260,690 1370,535 1480,690"/>
  </g>

  <g fill="#e9f8ff" opacity="0.92">
    <rect x="730" y="505" width="140" height="14" rx="7"/>
    <rect x="745" y="545" width="110" height="14" rx="7"/>
  </g>

  <text x="800" y="780" text-anchor="middle" font-size="92" letter-spacing="6" font-family="Georgia, 'Times New Roman', serif" fill="#eaf8ff">KALIX</text>
  <text x="800" y="827" text-anchor="middle" font-size="24" letter-spacing="2" font-family="Georgia, 'Times New Roman', serif" fill="#b5d8e8">Micro PHP Framework</text>
</svg>
